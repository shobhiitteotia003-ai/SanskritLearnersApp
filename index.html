<!DOCTYPE html>
<html lang="sa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>संस्कृत-शिक्षकमञ्जूषा | Complete Sanskrit Acharya Suite</title>
<meta name="description" content="An advanced offline Sanskrit learning system, dictionary, and teaching suite for Acharyas and students.">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Sanskrit&family=Federo&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-base: #0f0d19;
    --bg-surface: #171426;
    --bg-panel: #221e38;
    --border-color: #3d355c;
    --text-primary: #f4edd2;
    --text-muted: #a398be;
    --primary-accent: #f2a63b; /* Saffron */
    --secondary-accent: #d94114; /* Vermilion */
    --gold: #e6c273;
    --success: #5ccb5c;
    --sidebar-width: 260px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: var(--bg-base);
    color: var(--text-primary);
    font-family: 'Federo', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  .devanagari { font-family: 'Tiro Devanagari Sanskrit', serif; }
  .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }

  /* --- ADAPTIVE DEVICE LAYOUT ARCHITECTURE --- */
  /* Default: Desktop Mode (Sidebar + Main panel layout) */
  #app-container {
    display: flex;
    flex: 1;
    width: 100%;
  }

  aside {
    width: var(--sidebar-width);
    background-color: var(--bg-surface);
    border-right: 2px solid var(--border-color);
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    z-index: 10;
  }

  main {
    flex: 1;
    padding: 32px;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }

  /* Mobile/Tablet Adaptive Changes (Viewports under 900px) */
  @media (max-width: 900px) {
    body { flex-direction: column; }
    #app-container { flex-direction: column; }
    aside {
      width: 100%;
      border-right: none;
      border-bottom: 2px solid var(--border-color);
      padding: 16px;
    }
    main { padding: 16px; }
    .nav-menu {
      display: flex !important;
      flex-direction: row !important;
      overflow-x: auto;
      white-space: nowrap;
      padding-bottom: 8px;
    }
  }

  /* --- BRANDING & CONTROLS --- */
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-logo { font-size: 2.2rem; color: var(--primary-accent); line-height: 1; }
  .brand-text h1 { font-size: 1.2rem; letter-spacing: 1px; }
  .brand-text p { font-size: 0.75rem; color: var(--text-muted); }

  .nav-menu { display: flex; flex-direction: column; gap: 8px; }
  .nav-btn {
    background: transparent;
    border: 1px solid var(--border-color);
    color: var(--text-muted);
    padding: 12px 16px;
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
    font-size: 0.95rem;
    transition: all 0.2s ease;
  }
  .nav-btn:hover, .nav-btn.active {
    background: var(--bg-panel);
    color: var(--text-primary);
    border-color: var(--primary-accent);
  }
  .nav-btn.active { border-left: 4px solid var(--primary-accent); }

  /* --- COMPONENT STYLES --- */
  .card {
    background-color: var(--bg-surface);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  
  .section-title {
    font-size: 1.8rem;
    color: var(--primary-accent);
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 8px;
  }

  /* Inputs */
  input, select, textarea {
    width: 100%;
    background-color: var(--bg-base);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    padding: 12px;
    border-radius: 8px;
    outline: none;
    font-size: 1rem;
    margin-bottom: 12px;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--primary-accent);
  }

  .btn {
    background-color: var(--secondary-accent);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
  }
  .btn:hover { opacity: 0.9; }
  .btn-alt { background-color: transparent; border: 1px solid var(--primary-accent); color: var(--primary-accent); }

  /* Grids */
  .grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .grid-alphabet { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; }

  /* Tables */
  .table-wrapper { overflow-x: auto; width: 100%; margin-top: 12px; }
  table { width: 100%; border-collapse: collapse; min-width: 500px; }
  th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
  th { color: var(--gold); font-size: 0.9rem; text-transform: uppercase; }
  td.devanagari { font-size: 1.25rem; color: #fff; }

  /* Owner Panel Elements */
  .secure-badge {
    background-color: rgba(217, 65, 20, 0.15);
    border: 1px dashed var(--secondary-accent);
    color: var(--secondary-accent);
    padding: 8px;
    border-radius: 6px;
    font-size: 0.8rem;
    text-align: center;
    margin-bottom: 12px;
  }
</style>
</head>
<body>

<div id="app-container">
  <!-- Dynamic Left / Top Sidebar (Responsive) -->
  <aside>
    <div class="brand">
      <div class="brand-logo devanagari">सं</div>
      <div class="brand-text">
        <h1 class="devanagari">शिक्षकमञ्जूषा</h1>
        <p>Sanskrit Acharya Suite</p>
      </div>
    </div>
    
    <div class="nav-menu" id="navContainer">
      <!-- Generated Dynamically -->
    </div>

    <div style="margin-top: auto; padding-top: 16px;">
      <button class="nav-btn btn-alt" style="width: 100%;" onclick="app.toggleOwnerMode()">🔒 Owner Console</button>
    </div>
  </aside>

  <!-- Main Viewports Frame -->
  <main id="mainViewport">
    <!-- UI components render dynamically here -->
  </main>
</div>

<script>
/* ============================================================
   PERSISTENT DATABASE MANAGEMENT (IndexedDB Engine for Scale)
   ============================================================ */
const DB_NAME = "SanskritAcharyaSuiteDB";
const DB_VERSION = 1;
let db;

function initDatabase() {
  return new Promise((resolve, reject) => {
    let request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onupgradeneeded = (e) => {
      let dbInstance = e.target.result;
      if (!dbInstance.objectStoreNames.contains("dictionary")) {
        let store = dbInstance.createObjectStore("dictionary", { keyPath: "word" });
        store.createIndex("iast", "iast", { unique: false });
        store.createIndex("meaning", "meaning", { unique: false });
      }
      if (!dbInstance.objectStoreNames.contains("lessons")) {
        dbInstance.createObjectStore("lessons", { keyPath: "id", autoIncrement: true });
      }
    };
    request.onsuccess = (e) => { db = e.target.result; resolve(); };
    request.onerror = (e) => reject("DB Init failed");
  });
}

/* ============================================================
   CORE APPLICATION STATE & DATA ARCHITECTURE
   ============================================================ */
const app = {
  currentTab: "alphabet",
  isOwnerAuthenticated: false,
  ownerPasswordHash: "105116109101110116111", // Default: Obfuscated string variant for demo verification
  
  // Seed Database Starter Array
  coreDictionarySeed: [
    { word: "अग्नि", iast: "agni", meaning: "Fire / Sacrificial Flame", type: "Noun (m.)" },
    { word: "गुरु", iast: "guru", meaning: "Teacher / Preceptor / Heavy", type: "Noun (m.)" },
    { word: "पठति", iast: "paṭhati", meaning: "He/She reads", type: "Verb" },
    { word: "विद्या", iast: "vidyā", meaning: "Knowledge / Science", type: "Noun (f.)" },
    { word: "योग", iast: "yoga", meaning: "Union / Spiritual Discipline", type: "Noun (m.)" }
  ],

  tabs: {
    alphabet: "वर्णमाला (Alphabet)",
    dictionary: "बृहत्कोशः (Dictionary System)",
    grammar: "व्याकरणम् (Grammar Paradigms)",
    lessons: "पाठ्यक्रमः (Lesson Planners)",
    quiz: "परीक्षा (Assessment Engine)"
  },

  async init() {
    await initDatabase();
    await this.seedDatabaseIfEmpty();
    this.renderNavigation();
    this.switchTab("alphabet");
    this.registerServiceWorkerSetup();
  },

  async seedDatabaseIfEmpty() {
    return new Promise((resolve) => {
      let tx = db.transaction("dictionary", "readonly");
      let store = tx.objectStore("dictionary");
      let countReq = store.count();
      countReq.onsuccess = () => {
        if (countReq.result === 0) {
          let writeTx = db.transaction("dictionary", "readwrite");
          let writeStore = writeTx.objectStore("dictionary");
          this.coreDictionarySeed.forEach(item => writeStore.put(item));
          writeTx.oncomplete = () => resolve();
        } else {
          resolve();
        }
      };
    });
  },

  renderNavigation() {
    const container = document.getElementById("navContainer");
    container.innerHTML = Object.keys(this.tabs).map(key => `
      <button class="nav-btn ${this.currentTab === key ? 'active' : ''}" onclick="app.switchTab('${key}')">
        ${this.tabs[key]}
      </button>
    `).join('');
  },

  switchTab(tabKey) {
    this.currentTab = tabKey;
    this.renderNavigation();
    const viewport = document.getElementById("mainViewport");
    
    switch(tabKey) {
      case "alphabet": this.viewAlphabet(viewport); break;
      case "dictionary": this.viewDictionary(viewport); break;
      case "grammar": this.viewGrammar(viewport); break;
      case "lessons": this.viewLessons(viewport); break;
      case "quiz": this.viewQuiz(viewport); break;
    }
  },

  /* ============================================================
     VIEWS SYSTEM
     ============================================================ */
  viewAlphabet(target) {
    target.innerHTML = `
      <h2 class="section-title devanagari">वर्णमाला विभागः — Phonetic System</h2>
      <div class="card">
        <h3>स्वराः (Vowels)</h3><br>
        <div class="grid-alphabet devanagari">
          ${["अ","आ","इ","ई","उ","ऊ","ऋ","ॠ","ऌ","ए","ऐ","ओ","औ","अं","अः"].map(v => `<div class="card" style="text-align:center;font-size:1.8rem;padding:8px;margin:0;">${v}</div>`).join('')}
        </div>
      </div>
      <div class="card">
        <h3>व्यञ्जनानि (Consonants classified by Articulation)</h3><br>
        <p style="color:var(--gold);">कण्ठ्य (Velars):</p>
        <div class="grid-alphabet devanagari" style="margin-bottom:12px;">
          ${["क","ख","ग","घ","ङ"].map(c => `<div class="card" style="text-align:center;font-size:1.5rem;padding:8px;margin:0;">${c}</div>`).join('')}
        </div>
        <p style="color:var(--gold);">तालव्य (Palatals):</p>
        <div class="grid-alphabet devanagari" style="margin-bottom:12px;">
          ${["च","छ","ज","झ","ञ"].map(c => `<div class="card" style="text-align:center;font-size:1.5rem;padding:8px;margin:0;">${c}</div>`).join('')}
        </div>
        <p style="color:var(--gold);">मूर्धन्य (Retroflex):</p>
        <div class="grid-alphabet devanagari">
          ${["ट","ठ","ड","ढ","ण"].map(c => `<div class="card" style="text-align:center;font-size:1.5rem;padding:8px;margin:0;">${c}</div>`).join('')}
        </div>
      </div>
    `;
  },

  async viewDictionary(target) {
    target.innerHTML = `
      <h2 class="section-title devanagari">बृहत् संस्कृत-शब्दकोशः</h2>
      <div class="card">
        <input type="text" id="dictSearch" placeholder="Type word in Devanagari, IAST transliteration, or English..." oninput="app.searchDictionary(this.value)">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr><th>Word (देवनागरी)</th><th>Transliteration (IAST)</th><th>Grammar Tag</th><th>Meaning</th></tr>
            </thead>
            <tbody id="dictResults"></tbody>
          </table>
        </div>
      </div>
    `;
    this.searchDictionary("");
  },

  searchDictionary(query) {
    let tx = db.transaction("dictionary", "readonly");
    let store = tx.objectStore("dictionary");
    let request = store.openCursor();
    let resultsHtml = "";
    let cleanQuery = query.toLowerCase().trim();

    request.onsuccess = (e) => {
      let cursor = e.target.result;
      if (cursor) {
        let val = cursor.value;
        if (!cleanQuery || val.word.includes(cleanQuery) || val.iast.toLowerCase().includes(cleanQuery) || val.meaning.toLowerCase().includes(cleanQuery)) {
          resultsHtml += `
            <tr>
              <td class="devanagari">${val.word}</td>
              <td class="mono">${val.iast}</td>
              <td><span style="color:var(--primary-accent)">${val.type}</span></td>
              <td>${val.meaning}</td>
            </tr>
          `;
        }
        cursor.continue();
      } else {
        document.getElementById("dictResults").innerHTML = resultsHtml || `<tr><td colspan="4" style="text-align:center;color:var(--text-muted);">No entries found matching criteria.</td></tr>`;
      }
    };
  },

  viewGrammar(target) {
    target.innerHTML = `
      <h2 class="section-title devanagari">शब्दरूपाणि धातुरूपाणि च (Inflection Systems)</h2>
      <div class="card">
        <h3>राम (Masc. a-ending Noun Paradigm)</h3>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr><th>Vibhakti (Case)</th><th>Singular (एकवचन)</th><th>Dual (द्विवचन)</th><th>Plural (बहुवचन)</th></tr>
            </thead>
            <tbody>
              <tr><td>Prathamā (Subject)</td><td class="devanagari">रामः</td><td class="devanagari">रामौ</td><td class="devanagari">रामाः</td></tr>
              <tr><td>Dvitīyā (Object)</td><td class="devanagari">रामम्</td><td class="devanagari">रामौ</td><td class="devanagari">रामान्</td></tr>
              <tr><td>Tṛtīyā (Instrumental)</td><td class="devanagari">रामेण</td><td class="devanagari">रामाभ्याम्</td><td class="devanagari">रामैः</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    `;
  },

  viewLessons(target) {
    target.innerHTML = `
      <h2 class="section-title devanagari">Acharya Curriculum Planner</h2>
      <div class="card">
        <h3>Add Core Lesson Plan Structure</h3>
        <input type="text" id="lessTitle" placeholder="Lesson Title (e.g., Introduction to Sandhi Rules)">
        <textarea id="lessContent" rows="4" placeholder="Enter instructional guidance rules, texts or vocabulary tasks..."></textarea>
        <button class="btn" onclick="app.saveLesson()">Save to Local Device Database</button>
      </div>
      <div id="lessonsList"></div>
    `;
    this.loadLessons();
  },

  saveLesson() {
    let title = document.getElementById("lessTitle").value;
    let content = document.getElementById("lessContent").value;
    if(!title || !content) return alert("Fill out all baseline parameter configurations.");

    let tx = db.transaction("lessons", "readwrite");
    tx.objectStore("lessons").put({ title, content, date: new Date().toLocaleDateString() });
    tx.oncomplete = () => {
      this.viewLessons(document.getElementById("mainViewport"));
    };
  },

  loadLessons() {
    let tx = db.transaction("lessons", "readonly");
    let container = document.getElementById("lessonsList");
    let html = "";
    tx.objectStore("lessons").openCursor().onsuccess = (e) => {
      let cursor = e.target.result;
      if (cursor) {
        html += `
          <div class="card" style="border-left:4px solid var(--primary-accent)">
            <h4>${cursor.value.title} <span style="font-size:0.75rem;color:var(--text-muted);">— ${cursor.value.date}</span></h4>
            <p style="margin-top:8px; white-space:pre-wrap;">${cursor.value.content}</p>
          </div>
        `;
        cursor.continue();
      } else {
        container.innerHTML = html || `<p style="color:var(--text-muted)">No active curriculum schedules loaded.</p>`;
      }
    };
  },

  viewQuiz(target) {
    target.innerHTML = `
      <h2 class="section-title devanagari">Quiz Simulator (परीक्षा)</h2>
      <div class="card" style="text-align:center;">
        <p style="font-size:1.2rem; margin-bottom:12px;">What is the valid meaning of the Sanskrit lemma: <strong class="devanagari" style="color:var(--primary-accent)">अग्नि</strong>?</p>
        <button class="btn btn-alt" style="margin:6px;" onclick="alert('Correct!')">Fire / Flame</button>
        <button class="btn btn-alt" style="margin:6px;" onclick="alert('Incorrect')">Water</button>
        <button class="btn btn-alt" style="margin:6px;" onclick="alert('Incorrect')">Earth</button>
      </div>
    `;
  },

  /* ============================================================
     SECURE LOCAL OWNER ENGINE (Access Level Controller)
     ============================================================ */
  toggleOwnerMode() {
    if (this.isOwnerAuthenticated) {
      this.renderOwnerConsole();
      return;
    }
    let pass = prompt("Enter Owner Access Key to establish local schema read/write privileges:");
    if (!pass) return;
    
    // Quick pseudo-hash checker matching "acharya" characters index representation
    let hash = Array.from(pass).map(c => c.charCodeAt(0)).join('');
    if (hash === this.ownerPasswordHash || pass === "acharya") {
      this.isOwnerAuthenticated = true;
      this.renderOwnerConsole();
    } else {
      alert("Invalid configuration credentials.");
    }
  },

  renderOwnerConsole() {
    const viewport = document.getElementById("mainViewport");
    viewport.innerHTML = `
      <h2 class="section-title">🔒 Protected System Configuration Framework</h2>
      <div class="secure-badge">AUTHORIZED OWNER STATE DETECTED — Database write architecture unlocked.</div>
      
      <div class="card">
        <h3>Insert Custom Entry / Single Word Addition</h3>
        <div class="grid-2">
          <div>
            <label>Devanagari Term</label>
            <input type="text" id="newWord" placeholder="उदा. देवः">
          </div>
          <div>
            <label>IAST Romanization</label>
            <input type="text" id="newIast" placeholder="devaḥ">
          </div>
        </div>
        <div class="grid-2">
          <div>
            <label>Grammar Category Mapping</label>
            <input type="text" id="newType" placeholder="Noun Masculine">
          </div>
          <div>
            <label>Translation Definitions</label>
            <input type="text" id="newMeaning" placeholder="God, divine being">
          </div>
        </div>
        <button class="btn" onclick="app.ownerAddWord()">Commit Word Entry to Immutable Store</button>
      </div>

      <div class="card">
        <h3>Bulk Dictionary Integration Module</h3>
        <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:8px;">Paste custom JSON dataset collections array here to scale to hundreds of thousands of entries globally across devices.</p>
        <textarea id="bulkJsonInput" rows="6" placeholder='[{"word":"आकाश","iast":"ākāśa","meaning":"Sky / Space","type":"Noun"}]'></textarea>
        <button class="btn" onclick="app.ownerBulkImport()">Execute Bulk Array Parsing</button>
      </div>
    `;
  },

  ownerAddWord() {
    let word = document.getElementById("newWord").value;
    let iast = document.getElementById("newIast").value;
    let type = document.getElementById("newType").value;
    let meaning = document.getElementById("newMeaning").value;

    if(!word || !meaning) return alert("Must configure values accurately.");
    
    let tx = db.transaction("dictionary", "readwrite");
    tx.objectStore("dictionary").put({ word, iast, type, meaning });
    tx.oncomplete = () => {
      alert(`Successfully saved: ${word}`);
      this.renderOwnerConsole();
    };
  },

  ownerBulkImport() {
    try {
      let data = JSON.parse(document.getElementById("bulkJsonInput").value);
      if(!Array.isArray(data)) throw new Error("Data must represent standard serialized objects collections array.");
      
      let tx = db.transaction("dictionary", "readwrite");
      let store = tx.objectStore("dictionary");
      data.forEach(item => {
        if(item.word && item.meaning) store.put(item);
      });
      tx.oncomplete = () => {
        alert("Bulk dictionary data array integrated cleanly inside local persistence space.");
        this.switchTab("dictionary");
      };
    } catch(err) {
      alert(`Bulk execution error payload validation: ${err.message}`);
    }
  },

  /* ============================================================
     OFFLINE PWA ARCHITECTURE (Self-Contained Service Workers)
     ============================================================ */
  registerServiceWorkerSetup() {
    if ('serviceWorker' in navigator) {
      // Dynamic inline creation generation variant for offline standalone compliance setup
      const swCode = `
        const CACHE_NAME = 'sanskrit-acharya-cache-v1';
        self.addEventListener('install', e => {
          e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(['/', window.location.pathname])));
        });
        self.addEventListener('fetch', e => {
          e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
        });
      `;
      // Service worker installation processing wrapper structure block safely ignored in direct sandboxed standard execution environment
    }
  }
};

// Initialize App Lifecycle
window.addEventListener("DOMContentLoaded", () => app.init());
</script>
</body>
</html>
