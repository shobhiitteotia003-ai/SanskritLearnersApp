<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>संस्कृतम् · Saṃskṛtam — Sanskrit Learning</title>
<meta name="description" content="Learn Sanskrit with a Devanagari alphabet guide, Sanskrit–Hindi–English dictionary, grammar tables, phrases, mantras, and flashcards. Available in Hindi, English, and Sanskrit.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Sanskrit:ital@0;1&family=Fraunces:opsz,wght@9..144,400;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#141225; --bg-alt:#1B1832; --panel:#211D3B; --panel-border:#3A335C;
    --ink:#F1E9D8; --ink-muted:#B4A9CC; --saffron:#E8A33D; --vermilion:#C1440E; --gold:#D7B56D;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(ellipse at top, var(--bg-alt), var(--bg));
    color:var(--ink); font-family:'Fraunces',serif; min-height:100vh;
  }
  ::selection{background:var(--vermilion); color:#fff;}
  a{color:inherit;}
  .devanagari{font-family:'Tiro Devanagari Sanskrit',serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .wrap{max-width:980px; margin:0 auto; padding:0 24px;}

  header{padding:28px 24px 20px;}
  .top-row{display:flex; justify-content:flex-end; align-items:center; gap:8px; margin-bottom:18px; flex-wrap:wrap;}
  .top-row .sep{margin-right:12px;}
  .lang-label{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-muted);}
  .lang-btn, .dl-btn{
    font-family:'JetBrains Mono',monospace; font-size:12px; padding:6px 12px;
    background:transparent; color:var(--ink-muted); border:1px solid var(--panel-border);
    border-radius:6px; cursor:pointer;
  }
  .lang-btn.active{background:var(--saffron); color:#241B0A; border-color:var(--saffron); font-weight:600;}
  .dl-btn{background:var(--vermilion); color:#F8ECD9; border-color:var(--vermilion); font-weight:600;}
  .dl-btn:hover{opacity:0.9;}
  .lang-btn:focus-visible, .dl-btn:focus-visible, .tab-btn:focus-visible, button:focus-visible{
    outline:2px solid var(--saffron); outline-offset:2px;
  }

  .brand-row{display:flex; align-items:center; gap:14px; margin-bottom:6px;}
  .brand-glyph{font-family:'Tiro Devanagari Sanskrit',serif; font-size:40px; color:var(--saffron); line-height:1;}
  .brand-name{font-weight:600; font-size:22px; color:var(--ink);}
  .brand-tagline{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-muted);}
  .intro{color:var(--ink-muted); font-size:14px; max-width:640px; line-height:1.6; margin-top:14px;}

  nav{display:flex; gap:8px; flex-wrap:wrap; padding:0 0 20px;}
  .tab-btn{
    font-family:'Fraunces',serif; font-size:14px; letter-spacing:0.04em; padding:10px 16px;
    background:transparent; color:var(--ink-muted); border:1px solid var(--panel-border);
    border-radius:999px; cursor:pointer; white-space:nowrap; transition:all .2s ease;
  }
  .tab-btn.active{background:var(--vermilion); color:#F8ECD9; border-color:var(--vermilion);}

  main{padding:0 0 60px;}
  .card{background:var(--panel); border:1px solid var(--panel-border); border-radius:10px; padding:18px 20px; margin-bottom:16px;}
  .eyebrow{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--saffron); letter-spacing:.12em; text-transform:uppercase; margin-bottom:6px;}
  .section-title{font-weight:600; font-size:26px; color:var(--ink); margin:0 0 20px;}
  .sub-label{font-size:15px; color:var(--ink-muted); margin-bottom:14px;}
  .hint{font-size:12px; color:var(--ink-muted); margin-top:14px;}

  /* Varnamala */
  .vowel-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:10px;}
  .vowel-btn{background:var(--bg-alt); border:1px solid var(--panel-border); border-radius:8px; padding:12px 8px; text-align:center; cursor:pointer;}
  .vowel-btn.active{background:rgba(232,163,61,0.15); border-color:var(--saffron);}
  .vowel-dev{font-family:'Tiro Devanagari Sanskrit',serif; font-size:30px; color:var(--ink);}
  .vowel-iast{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--gold); margin-top:4px;}
  .varga-block{margin-bottom:16px;}
  .varga-label{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--saffron); margin-bottom:8px;}
  .consonant-row{display:flex; flex-wrap:wrap; gap:8px;}
  .consonant-item{background:var(--bg-alt); border:1px solid var(--panel-border); border-radius:8px; padding:8px 12px; text-align:center; min-width:64px;}
  .consonant-dev{font-family:'Tiro Devanagari Sanskrit',serif; font-size:24px; color:var(--ink);}
  .consonant-iast{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--gold);}

  /* Dictionary */
  .dict-controls{display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap;}
  .search-input{
    flex:1 1 260px; background:var(--bg-alt); border:1px solid var(--panel-border); border-radius:8px;
    padding:10px 14px; color:var(--ink); font-family:'Fraunces',serif; font-size:15px; outline:none;
  }
  .search-input:focus, .cat-select:focus{border-color:var(--saffron);}
  .cat-select{background:var(--bg-alt); border:1px solid var(--panel-border); border-radius:8px; padding:10px 14px; color:var(--ink); font-family:'Fraunces',serif; font-size:14px;}
  .dict-count{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-muted); margin-bottom:12px;}
  .dict-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px;}
  .dict-card{padding:14px 16px;}
  .dict-card-top{display:flex; justify-content:space-between; align-items:baseline;}
  .dict-dev{font-family:'Tiro Devanagari Sanskrit',serif; font-size:24px; color:var(--ink);}
  .dict-cat{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--saffron); text-transform:uppercase;}
  .dict-iast{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--gold); margin-top:4px;}
  .dict-line{margin-top:8px; font-size:14px; color:var(--ink);}
  .dict-line .lbl{color:var(--ink-muted);}
  .no-results{color:var(--ink-muted); font-style:italic;}

  /* Grammar */
  table{width:100%; border-collapse:collapse;}
  th{text-align:left; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--saffron); padding:6px 8px; border-bottom:1px solid var(--panel-border);}
  td{padding:8px; border-bottom:1px solid var(--bg-alt);}
  td.label-col{font-size:13px; color:var(--ink-muted);}
  td.form-col{font-family:'Tiro Devanagari Sanskrit',serif; font-size:18px; color:var(--ink);}
  .table-scroll{overflow-x:auto;}
  .table-scroll table{min-width:400px;}
  .sandhi-row{display:grid; grid-template-columns:1fr 1.4fr; gap:12px; align-items:baseline; border-bottom:1px solid var(--bg-alt); padding-bottom:8px; margin-bottom:10px;}
  .sandhi-rule{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--saffron);}
  .sandhi-ex{font-family:'Tiro Devanagari Sanskrit',serif; font-size:17px; color:var(--ink);}
  .sandhi-trans{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-muted);}

  /* Phrases */
  .phrase-item{border-bottom:1px solid var(--bg-alt); padding-bottom:12px; margin-bottom:12px;}
  .phrase-item:last-child{border-bottom:none; margin-bottom:0;}
  .phrase-dev{font-family:'Tiro Devanagari Sanskrit',serif; font-size:19px; color:var(--ink);}
  .phrase-iast{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--gold); margin-top:2px;}
  .phrase-meaning{font-size:13px; color:var(--ink-muted); margin-top:4px;}
  .mantra-item{margin-bottom:20px;}
  .mantra-item:last-child{margin-bottom:0;}
  .mantra-title{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--saffron); text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px;}
  .mantra-dev{font-family:'Tiro Devanagari Sanskrit',serif; font-size:19px; color:var(--ink); line-height:1.6;}
  .mantra-iast{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--gold); margin-top:6px; line-height:1.6;}
  .mantra-note{font-size:13px; color:var(--ink-muted); margin-top:6px; font-style:italic;}

  /* Numbers */
  .numbers-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px;}
  .number-card{background:var(--bg-alt); border:1px solid var(--panel-border); border-radius:8px; padding:12px 14px;}
  .number-top{display:flex; justify-content:space-between; align-items:baseline;}
  .number-dev{font-family:'Tiro Devanagari Sanskrit',serif; font-size:22px; color:var(--saffron);}
  .number-num{font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--ink-muted);}
  .number-word{font-family:'Tiro Devanagari Sanskrit',serif; font-size:17px; color:var(--ink); margin-top:4px;}
  .number-iast{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--gold);}
  .number-hindi{font-size:12px; color:var(--ink-muted); margin-top:2px;}

  /* Flashcards */
  .fc-status{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px;}
  .fc-count{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-muted);}
  .fc-right{color:#8FCB8F;} .fc-wrong{color:var(--vermilion);}
  .reshuffle-btn{background:transparent; border:1px solid var(--panel-border); color:var(--ink-muted); border-radius:8px; padding:6px 12px; cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:11px;}
  .flashcard{
    min-height:220px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer; text-align:center; background:linear-gradient(160deg, var(--panel), var(--bg-alt));
  }
  .fc-dev{font-family:'Tiro Devanagari Sanskrit',serif; font-size:52px; color:var(--ink);}
  .fc-iast{font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--gold); margin-top:10px;}
  .fc-meaning{font-size:22px; color:var(--ink); font-family:'Fraunces',serif;}
  .fc-hindi{font-size:15px; color:var(--ink-muted); margin-top:8px;}
  .fc-cat{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--saffron); text-transform:uppercase; margin-top:10px;}
  .fc-actions{display:flex; gap:12px; margin-top:16px; justify-content:center;}
  .fc-btn{flex:1; max-width:180px; border-radius:8px; padding:10px 0; cursor:pointer; font-family:'Fraunces',serif; font-size:14px;}
  .fc-no{background:transparent; border:1px solid var(--vermilion); color:var(--vermilion);}
  .fc-yes{background:var(--saffron); border:1px solid var(--saffron); color:#241B0A; font-weight:600;}

  footer{padding:16px 0 40px; color:var(--ink-muted); font-size:11px; font-family:'JetBrains Mono',monospace; border-top:1px solid var(--panel-border); margin-top:16px;}

  @media (max-width:520px){
    .brand-glyph{font-size:32px;}
    .section-title{font-size:22px;}
    .fc-dev{font-size:40px;}
  }
</style>

function shuffle(arr){
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}
function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function render(){
  var ui = UI[state.lang];
  document.documentElement.lang = state.lang;
  document.title = ui.appName + " · " + ui.appSub;

  var langBtns = LANGS.map(function(l){
    return '<button class="lang-btn'+(state.lang===l.id?' active':'')+'" data-lang="'+l.id+'">'+l.label+'</button>';

  var tabBtns = TAB_IDS.map(function(id){

    + '    <button class="dl-btn" id="downloadBtn">'+esc(ui.downloadLabel)+'</button>'
    + '  </div>'
    + '  <div class="brand-row">'

  document.getElementById("root").innerHTML = html;

}

function bindHeaderEvents(){
  document.querySelectorAll(".lang-btn").forEach(function(btn){
    btn.addEventListener("click", function(){
      state.lang = btn.getAttribute("data-lang");
      render();
    });
  });
  document.querySelectorAll(".tab-btn").forEach(function(btn){
    btn.addEventListener("click", function(){
      state.tab = btn.getAttribute("data-tab");
      state.playingVowel = null;
      render();
    });
  });
  document.getElementById("downloadBtn").addEventListener("click", downloadApp);
}

function downloadApp(){
  var blob = new Blob([PAGE_SNAPSHOT], {type:"text/html"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "samskritam-sanskrit-learning-app.html";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
}

function renderTab(){
  var ui = UI[state.lang];
  var el = document.getElementById("tabContent");
  var fn = {
    varnamala: renderVarnamala,
    dictionary: renderDictionary,
    grammar: renderGrammar,
    phrases: renderPhrases,
    numbers: renderNumbers,
    flashcards: renderFlashcards
  }[state.tab];
  el.innerHTML = fn(ui);
  bindTabEvents();
}

function sectionTitle(eyebrow, title){
  return '<div class="eyebrow mono">'+esc(eyebrow)+'</div><h2 class="section-title">'+esc(title)+'</h2>';
}

/* ---- Varnamala ---- */
function renderVarnamala(ui){
  var t = ui.varnamala;
  var vowelBtns = VOWELS.map(function(v){
    var active = state.playingVowel && state.playingVowel.dev===v.dev;
    return '<button class="vowel-btn'+(active?' active':'')+'" data-vowel="'+esc(v.dev)+'">'
      + '<div class="vowel-dev devanagari">'+v.dev+'</div>'
      + '<div class="vowel-iast mono">'+v.iast+'</div></button>';
  }).join("");

  var hintOrInfo = state.playingVowel
    ? '<div class="hint">'+state.playingVowel.dev+' ('+state.playingVowel.iast+') — '+state.playingVowel.pron+'</div>'
    : '<div class="hint">'+esc(t.tapHint)+'</div>';

  var consonantBlocks = CONSONANT_ROWS.map(function(row){
    var items = row.items.map(function(c){
      return '<div class="consonant-item"><div class="consonant-dev devanagari">'+c.dev+'</div><div class="consonant-iast mono">'+c.iast+'</div></div>';
    }).join("");
    return '<div class="varga-block"><div class="varga-label">'+esc(row.varga)+'</div><div class="consonant-row">'+items+'</div></div>';
  }).join("");

  return sectionTitle(t.eyebrow, t.title)
    + '<div class="card"><div class="sub-label">'+esc(t.vowelsLabel)+'</div><div class="vowel-grid">'+vowelBtns+'</div>'+hintOrInfo+'</div>'
    + '<div class="card"><div class="sub-label">'+esc(t.consonantsLabel)+'</div>'+consonantBlocks+'</div>';
}

/* ---- Dictionary ---- */
function filteredDictionary(){
  var q = state.query.trim().toLowerCase();
  return DICTIONARY.filter(function(d){
    if (state.cat !== "all" && d.cat !== state.cat) return false;
    if (!q) return true;
    return d.dev.indexOf(state.query.trim())>-1 || d.iast.toLowerCase().indexOf(q)>-1
      || d.hindi.indexOf(state.query.trim())>-1 || d.eng.toLowerCase().indexOf(q)>-1;
  });
}

function renderDictionary(ui){
  var t = ui.dictionary;
  var results = filteredDictionary();
  var options = CATEGORY_KEYS.map(function(c){
    var label = c==="all" ? t.allCategories : ui.categories[c];
    return '<option value="'+c+'"'+(state.cat===c?' selected':'')+'>'+esc(label)+'</option>';
  }).join("");

  var cards = results.map(function(d){
    return '<div class="card dict-card">'
      + '<div class="dict-card-top"><div class="dict-dev devanagari">'+d.dev+'</div><div class="dict-cat mono">'+esc(ui.categories[d.cat])+'</div></div>'
      + '<div class="dict-iast mono">'+d.iast+'</div>'
      + '<div class="dict-line"><span class="lbl">'+esc(t.hindiLabel)+': </span>'+esc(d.hindi)+'</div>'
      + '<div class="dict-line"><span class="lbl">'+esc(t.englishLabel)+': </span>'+esc(d.eng)+'</div>'
      + '</div>';
  }).join("");

  return sectionTitle(t.eyebrow, t.title)
    + '<div class="dict-controls">'
    + '  <input class="search-input" id="dictSearch" type="text" placeholder="'+esc(t.searchPlaceholder)+'" value="'+esc(state.query)+'">'
    + '  <select class="cat-select" id="dictCat">'+options+'</select>'
    + '</div>'
    + '<div class="dict-count mono">'+results.length+' '+(results.length===1?esc(t.entry):esc(t.entries))+'</div>'
    + '<div class="dict-grid">'+(results.length ? cards : '<div class="no-results">'+esc(t.noResults)+'</div>')+'</div>';
}

/* ---- Grammar ---- */
function renderGrammar(ui){
  var t = ui.grammar;
  var vRows = VIBHAKTI_ROWS.map(function(r){
    return '<tr><td class="label-col">'+esc(r.c)+'</td><td class="form-col devanagari">'+r.sg+'</td><td class="form-col devanagari">'+r.du+'</td><td class="form-col devanagari">'+r.pl+'</td></tr>';
  }).join("");
  var cRows = VERB_ROWS.map(function(r){
    return '<tr><td class="label-col">'+esc(r.p)+'</td><td class="form-col devanagari">'+r.sg+'</td><td class="form-col devanagari">'+r.du+'</td><td class="form-col devanagari">'+r.pl+'</td></tr>';
  }).join("");
  var sandhi = SANDHI_EXAMPLES.map(function(s){
    return '<div class="sandhi-row"><div class="sandhi-rule mono">'+esc(s.rule)+'</div><div><div class="sandhi-ex devanagari">'+s.ex+'</div><div class="sandhi-trans mono">'+s.trans+'</div></div></div>';
  }).join("");

  return sectionTitle(t.eyebrow, t.title)
    + '<div class="card table-scroll">'
    + '  <div class="sub-label" style="color:var(--ink); margin-bottom:4px;">'+esc(VIBHAKTI_WORD)+'</div>'
    + '  <div class="sub-label">'+esc(t.vibhaktiSub)+'</div>'
    + '  <table><thead><tr><th>'+esc(t.caseHead)+'</th><th>'+esc(t.sgHead)+'</th><th>'+esc(t.duHead)+'</th><th>'+esc(t.plHead)+'</th></tr></thead><tbody>'+vRows+'</tbody></table>'
    + '</div>'
    + '<div class="card table-scroll">'
    + '  <div class="sub-label" style="color:var(--ink); margin-bottom:4px;">'+esc(VERB_WORD)+'</div>'
    + '  <div class="sub-label">'+esc(t.verbSub)+'</div>'
    + '  <table><thead><tr><th>'+esc(t.personHead)+'</th><th>'+esc(t.sgHead)+'</th><th>'+esc(t.duHead)+'</th><th>'+esc(t.plHead)+'</th></tr></thead><tbody>'+cRows+'</tbody></table>'
    + '</div>'
    + '<div class="card">'
    + '  <div class="sub-label" style="color:var(--ink); margin-bottom:4px;">'+esc(t.sandhiTitle)+'</div>'
    + '  <div class="sub-label">'+esc(t.sandhiSub)+'</div>'
    + sandhi
    + '</div>';
}

/* ---- Phrases ---- */
function renderPhrases(ui){
  var t = ui.phrases;
  var phraseItems = PHRASES.map(function(p){
    return '<div class="phrase-item"><div class="phrase-dev devanagari">'+p.dev+'</div><div class="phrase-iast mono">'+p.iast+'</div>'
      + '<div class="phrase-meaning">'+esc(t.hindiLabel)+': '+esc(p.hindi)+' &nbsp;·&nbsp; '+esc(t.englishLabel)+': '+esc(p.eng)+'</div></div>';
  }).join("");
  var mantraItems = MANTRAS.map(function(m){
    return '<div class="mantra-item"><div class="mantra-title mono">'+esc(m.title)+'</div>'
      + '<div class="mantra-dev devanagari">'+m.dev+'</div>'
      + '<div class="mantra-iast mono">'+m.iast+'</div>'
      + '<div class="mantra-note">'+esc(m.note)+'</div></div>';
  }).join("");

  return sectionTitle(t.eyebrow, t.title)
    + '<div class="card"><div class="sub-label">'+esc(t.phrasesSub)+'</div>'+phraseItems+'</div>'
    + '<div class="card"><div class="sub-label">'+esc(t.mantrasSub)+'</div>'+mantraItems+'</div>';
}

/* ---- Numbers ---- */
function renderNumbers(ui){
  var t = ui.numbers;
  var cards = NUMBERS.map(function(n){
    return '<div class="number-card">'
      + '<div class="number-top"><span class="number-dev devanagari">'+n.dev+'</span><span class="number-num mono">'+n.num+'</span></div>'
      + '<div class="number-word devanagari">'+n.sansDev+'</div>'
      + '<div class="number-iast mono">'+n.iast+'</div>'
      + '<div class="number-hindi">'+esc(t.hindiLabel)+': '+esc(n.hindi)+'</div>'
      + '</div>';
  }).join("");
  return sectionTitle(t.eyebrow, t.title) + '<div class="card"><div class="numbers-grid">'+cards+'</div></div>';
}

/* ---- Flashcards ---- */
function renderFlashcards(ui){
  var t = ui.flashcards;
  var card = DICTIONARY[state.fcOrder[state.fcPos]];
  var faceHtml = !state.fcFlipped
    ? '<div class="fc-dev devanagari">'+card.dev+'</div><div class="fc-iast mono">'+card.iast+'</div><div class="hint">'+esc(t.tapReveal)+'</div>'
    : '<div class="fc-meaning">'+esc(card.eng)+'</div><div class="fc-hindi">'+esc(t.hindiLabel)+': '+esc(card.hindi)+'</div><div class="fc-cat mono">'+esc(ui.categories[card.cat])+'</div>';

  var actions = state.fcFlipped
    ? '<div class="fc-actions"><button class="fc-btn fc-no" id="fcNo">'+esc(t.dontKnow)+'</button><button class="fc-btn fc-yes" id="fcYes">'+esc(t.know)+'</button></div>'
    : '';

  return sectionTitle(t.eyebrow, t.title)
    + '<div class="fc-status">'
    + '  <div class="fc-count mono">'+esc(t.cardOf(state.fcPos+1, state.fcOrder.length))+' &nbsp;·&nbsp; <span class="fc-right">✓ '+state.fcRight+'</span> &nbsp; <span class="fc-wrong">✕ '+state.fcWrong+'</span></div>'
    + '  <button class="reshuffle-btn" id="fcReshuffle">'+esc(t.reshuffle)+'</button>'
    + '</div>'
    + '<div class="card flashcard" id="fcCard">'+faceHtml+'</div>'
    + actions;
}

/* ============================================================
   EVENT BINDING FOR TAB CONTENT
   ============================================================ */
function bindTabEvents(){
  if (state.tab === "varnamala"){
    document.querySelectorAll(".vowel-btn").forEach(function(btn){
      btn.addEventListener("click", function(){
        var dev = btn.getAttribute("data-vowel");
        var v = VOWELS.filter(function(x){return x.dev===dev;})[0];
        state.playingVowel = (state.playingVowel && state.playingVowel.dev===dev) ? null : v;
        renderTab();
      });
    });
  }
  if (state.tab === "dictionary"){
    var search = document.getElementById("dictSearch");
    var cat = document.getElementById("dictCat");
    search.addEventListener("input", function(){
      state.query = search.value;
      renderTab();
      document.getElementById("dictSearch").focus();
      document.getElementById("dictSearch").value = state.query;
      var val = document.getElementById("dictSearch");
      val.selectionStart = val.selectionEnd = val.value.length;
    });
    cat.addEventListener("change", function(){
      state.cat = cat.value;
      renderTab();
    });
  }
  if (state.tab === "flashcards"){
    document.getElementById("fcCard").addEventListener("click", function(){
      state.fcFlipped = !state.fcFlipped;
      renderTab();
    });
    document.getElementById("fcReshuffle").addEventListener("click", function(e){
      e.stopPropagation();
      state.fcOrder = shuffle(DICTIONARY.map(function(_,i){return i;}));
      state.fcPos = 0; state.fcFlipped = false; state.fcRight = 0; state.fcWrong = 0;
      renderTab();
    });
    var yes = document.getElementById("fcYes");
    var no = document.getElementById("fcNo");
    if (yes) yes.addEventListener("click", function(e){ e.stopPropagation(); fcNext(true); });
    if (no) no.addEventListener("click", function(e){ e.stopPropagation(); fcNext(false); });
  }
}

function fcNext(known){
  if (known) state.fcRight++; else state.fcWrong++;
  state.fcFlipped = false;
  if (state.fcPos + 1 >= state.fcOrder.length){
    state.fcOrder = shuffle(DICTIONARY.map(function(_,i){return i;}));
    state.fcPos = 0;
  } else {
    state.fcPos++;
  }
  renderTab();
}

render();
</script>
